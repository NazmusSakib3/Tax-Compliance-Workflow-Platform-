name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Dependency review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

      - name: .NET vulnerable package check
        run: |
          dotnet restore backend/TaxCompliance.sln
          if dotnet list backend/TaxCompliance.sln package --vulnerable --include-transitive | grep -E '>\s' | grep -Eiq '\sHigh\s|\sCritical\s'; then
            echo "High or critical vulnerable NuGet packages detected."
            dotnet list backend/TaxCompliance.sln package --vulnerable --include-transitive
            exit 1
          fi

      - name: Setup Node.js (frontend audit)
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm audit (frontend production)
        working-directory: frontend
        run: |
          npm ci
          npm audit --omit=dev --audit-level=critical

      - name: npm audit (e2e)
        working-directory: e2e
        run: |
          npm ci
          npm audit --audit-level=high

      - name: Trivy repository scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,config
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: table

      - name: Trivy SARIF report
        if: always()
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,config
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy SARIF
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore backend/TaxCompliance.sln

      - name: Build Release
        run: dotnet build backend/TaxCompliance.sln --configuration Release --no-restore -warnaserror

      - name: Publish API (production verification)
        run: >
          dotnet publish backend/src/TaxCompliance.Api/TaxCompliance.Api.csproj
          --configuration Release
          --no-build
          --output ./artifacts/api

      - name: Test with coverage gate
        run: >
          dotnet test backend/TaxCompliance.sln
          --configuration Release
          --no-build
          --verbosity normal
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=opencover
          /p:CoverletOutput=./TestResults/coverage/
          /p:Threshold=45
          /p:ThresholdType=line
          /p:ThresholdStat=total

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/tests/TaxCompliance.Tests/TestResults/coverage/
          if-no-files-found: ignore

      - name: Upload API publish artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: api-publish
          path: artifacts/api/
          if-no-files-found: error

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build:production

      - name: Test with coverage gate
        run: npm run test:ci

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/tax-compliance-frontend/
          if-no-files-found: ignore

      - name: Upload frontend dist artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/tax-compliance-frontend/
          if-no-files-found: error

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build API image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: backend/src/TaxCompliance.Api/Dockerfile
          push: false
          load: true
          tags: taxcompliance-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: frontend/Dockerfile
          push: false
          load: true
          tags: taxcompliance-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan API image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: taxcompliance-api:ci
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: table

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: taxcompliance-frontend:ci
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: table

  e2e:
    runs-on: ubuntu-latest
    needs: [security, backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            e2e/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browser
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Start infrastructure
        run: docker compose up -d postgres redis rabbitmq

      - name: Wait for infrastructure
        run: |
          for i in {1..60}; do
            if docker compose exec -T postgres pg_isready -U postgres -d taxcompliance; then
              break
            fi
            sleep 2
          done
          docker compose exec -T postgres pg_isready -U postgres -d taxcompliance

          for i in {1..60}; do
            if docker compose exec -T redis redis-cli ping | grep -q PONG; then
              break
            fi
            sleep 2
          done
          docker compose exec -T redis redis-cli ping | grep -q PONG

          for i in {1..60}; do
            if docker compose exec -T rabbitmq rabbitmq-diagnostics -q ping; then
              exit 0
            fi
            sleep 2
          done
          echo "RabbitMQ failed to accept TCP connections"
          exit 1

      - name: Restore backend
        run: dotnet restore backend/TaxCompliance.sln

      - name: Start API
        env:
          ASPNETCORE_ENVIRONMENT: CI
          ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=taxcompliance;Username=postgres;Password=postgres
          ConnectionStrings__Redis: localhost:6379
          RabbitMq__HostName: localhost
          RabbitMq__UserName: guest
          RabbitMq__Password: guest
          Jwt__SigningKey: ChangeThisCiKeyToALongerSecret1234567890
          Seed__AdminEmail: admin@taxplatform.local
          Seed__AdminPassword: Admin123!
          Notifications__DefaultRecipientEmail: admin@taxplatform.local
          Email__Provider: Smtp
          Email__FromAddress: no-reply@taxplatform.local
          Email__SmtpHost: localhost
          Email__Username: ci-user
          Email__Password: ci-password
          Cors__AllowedOrigins__0: http://localhost:4200
          PasswordReset__ClientResetUrl: http://localhost:4200/reset-password
        run: |
          dotnet run --project backend/src/TaxCompliance.Api/TaxCompliance.Api.csproj --urls http://localhost:8080 > api.log 2>&1 &
          for i in {1..60}; do
            if curl --fail --silent http://localhost:8080/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "API failed to become healthy"
          cat api.log
          exit 1

      - name: Start frontend
        working-directory: frontend
        run: |
          npm start -- --host 0.0.0.0 > ../frontend.log 2>&1 &
          for i in {1..60}; do
            if curl --fail --silent http://localhost:4200 > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Frontend failed to become ready"
          cat ../frontend.log
          exit 1

      - name: Run Playwright smoke tests
        working-directory: e2e
        env:
          E2E_BASE_URL: http://localhost:4200
          E2E_API_BASE_URL: http://localhost:8080/api
        run: npm test

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            e2e/test-results/
            e2e/playwright-report/
            api.log
            frontend.log
          if-no-files-found: ignore
